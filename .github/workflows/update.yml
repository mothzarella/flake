name: update

on:
  schedule: [{ cron: "0 */12 * * *" }]
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        run: |
          shopt -s nullglob
          names=()
          for pkg in pkgs/*.nix; do
            names+=("$(basename "$pkg" .nix)")
          done
          json="$(printf '%s\n' "${names[@]}" | jq -R . | jq -sc .)"
          echo "packages=$json" >> "$GITHUB_OUTPUT"

  update:
    needs: discover
    if: needs.discover.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.packages) }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Install nix-update
        run: |
          ver="$(nix --version 2>/dev/null || true)"
          if printf '%s\n' "$ver" | grep -qE '\(Nix\) 2\.'; then
            echo "Detected Nix 2.x — installing via nix-env"
            nix-env -iA nixpkgs.nix-update
          else
            echo "Detected Nix 3.x — installing via nix profile add"
            nix profile add nixpkgs#nix-update
          fi

      - name: Set up git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare update branch
        run: |
          branch="update/${{ matrix.name }}"
          git fetch origin main
          if git fetch origin "$branch"; then
            echo "Reusing existing branch $branch"
            git checkout -B "$branch" "origin/$branch"
            if ! git rebase origin/main; then
              echo "::warning::Rebase of $branch onto main failed, discarding stale branch"
              git rebase --abort
              git reset --hard origin/main
            fi
          else
            git checkout -B "$branch" origin/main
          fi

      - name: Run update
        run: nix-update --flake "${{ matrix.name }}" || true

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes for ${{ matrix.name }}"
            exit 0
          fi

          branch="update/${{ matrix.name }}"
          title="chore(${{ matrix.name }}): bump package"
          git add -A
          git commit -m "$title"
          git push --force -u origin "$branch"

          if gh pr view "$branch" >/dev/null 2>&1; then
            echo "PR for $branch already open, updated by the force-push above"
          else
            gh pr create \
              --title "$title" \
              --body "Automated version bump for \`${{ matrix.name }}\` via \`nix-update\`." \
              --label dependencies \
              --head "$branch" \
              --base main
          fi
